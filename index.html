<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Precision Kinetic Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #debug-panel { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.85); color: #0f0; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; z-index: 100; border: 1px solid #333; pointer-events: none; }
        #status-display { font-size: 18px; color: #fff; margin-bottom: 5px; }
        canvas#webcam-preview { position: absolute; top: 10px; right: 10px; width: 160px; height: 120px; border: 1px solid #444; transform: scaleX(-1); border-radius: 4px; }
    </style>
</head>
<body>

    <div id="debug-panel">
        <div id="status-display">INITIALIZING AI...</div>
        <div>Landmarks: <span id="landmark-count">0</span></div>
        <div>Gesture: <span id="gesture-name">NONE</span></div>
        <div style="color: #666; margin-top: 5px;">Mode: 100% Precision Refactor</div>
    </div>

    <video id="video" style="display:none" autoplay playsinline></video>
    <canvas id="webcam-preview"></canvas>

    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { HandLandmarker, FilesetResolver, DrawingUtils } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        let handLandmarker;
        let video = document.getElementById('video');
        let statusDisplay = document.getElementById('status-display');
        let landmarkCount = document.getElementById('landmark-count');
        let gestureName = document.getElementById('gesture-name');
        
        // THREE.JS Globals
        let scene, camera, renderer, particles;
        const PARTICLE_COUNT = 8000;
        const posArray = new Float32Array(PARTICLE_COUNT * 3);
        const colArray = new Float32Array(PARTICLE_COUNT * 3);

        async function createHandLandmarker() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 2,
                    minHandDetectionConfidence: 0.5,
                    minHandPresenceConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });
                statusDisplay.innerText = "AI ONLINE";
                startCamera();
            } catch (e) {
                statusDisplay.innerText = "ERROR: WASM FAILED";
                console.error(e);
            }
        }

        async function startCamera() {
            const constraints = { video: { width: 640, height: 480 } };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            video.addEventListener("loadeddata", predictWebcam);
        }

        let results = undefined;
        async function predictWebcam() {
            if (handLandmarker) {
                const startTimeMs = performance.now();
                results = handLandmarker.detectForVideo(video, startTimeMs);
                
                // Update Debug UI
                if (results.landmarks) {
                    landmarkCount.innerText = results.landmarks.length > 0 ? "DETECTED" : "0";
                }
            }
            window.requestAnimationFrame(predictWebcam);
        }

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 10;
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            for (let i = 0; i < PARTICLE_COUNT * 3; i++) posArray[i] = (Math.random() - 0.5) * 20;
            geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colArray, 3));
            
            particles = new THREE.Points(geometry, new THREE.PointsMaterial({ size: 0.05, vertexColors: true }));
            scene.add(particles);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const pos = particles.geometry.attributes.position.array;
            const col = particles.geometry.attributes.color.array;

            let currentGesture = "IDLE";
            let tx = 0, ty = 0;

            if (results && results.landmarks && results.landmarks.length > 0) {
                const hands = results.landmarks;
                tx = (0.5 - hands[0][9].x) * 20;
                ty = (0.5 - hands[0][9].y) * 15;

                // DETECT PINCH (Saturn)
                const d = (p1, p2) => Math.hypot(p1.x-p2.x, p1.y-p2.y);
                const pinchDist = d(hands[0][4], hands[0][8]);
                
                if (hands.length === 2) {
                    if (d(hands[0][8], hands[1][8]) < 0.1) currentGesture = "HEART";
                    else if (d(hands[0][9], hands[1][9]) < 0.1) currentGesture = "CLAP";
                } else {
                    if (pinchDist < 0.05) currentGesture = "SATURN";
                    else if (d(hands[0][0], hands[0][12]) > 0.4) currentGesture = "EXPAND";
                }
            }

            gestureName.innerText = currentGesture;

            // Simple Logic for Particles
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const ix = i * 3;
                if (currentGesture === "SATURN") {
                    pos[ix] += (tx + Math.cos(i) * 2 - pos[ix]) * 0.1;
                    pos[ix+1] += (ty + Math.sin(i) * 2 - pos[ix+1]) * 0.1;
                } else {
                    pos[ix] += (tx - pos[ix]) * 0.02;
                    pos[ix+1] += (ty - pos[ix+1]) * 0.02;
                }
            }
            particles.geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }

        initThree();
        createHandLandmarker();
    </script>
</body>
</html>
