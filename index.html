<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Gesture Engine - V4.0</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #00ff00; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        #video-container { 
            position: absolute; bottom: 30px; right: 30px; 
            width: 240px; height: 180px; 
            border: 2px solid #00ff00; border-radius: 15px; 
            overflow: hidden; transform: scaleX(-1); 
            box-shadow: 0 0 20px rgba(0,255,0,0.3); z-index: 100;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        #hud { 
            position: absolute; top: 30px; left: 30px; 
            background: rgba(0, 20, 0, 0.85); padding: 20px; 
            border-left: 5px solid #00ff00; pointer-events: none; 
            text-transform: uppercase; letter-spacing: 2px;
        }
        .val { color: #fff; font-weight: bold; }
        #start-btn { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); padding: 25px 50px; 
            background: #00ff00; color: #000; border: none; 
            font-weight: 900; font-size: 1.2rem; cursor: pointer; 
            border-radius: 5px; box-shadow: 0 0 30px #00ff00; z-index: 200;
        }
    </style>
</head>
<body>

    <button id="start-btn">INITIALIZE CORE ENGINE</button>

    <div id="hud">
        <div style="font-size: 1.5rem; margin-bottom: 10px;">System Active</div>
        <div>Shape: <span id="mode-ui" class="val">HEART</span></div>
        <div>Gesture: <span id="gesture-ui" class="val">IDLE</span></div>
        <div>Scale: <span id="scale-ui" class="val">1.0</span></div>
    </div>

    <div id="video-container"><video id="input-video" playsinline></video></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        // --- System Configuration ---
        const CONFIG = {
            particleCount: 15000,
            lerpSpeed: 0.07,
            modes: ['HEART', 'SATURN', 'FIREWORKS', 'FLOWER', 'GALAXY'],
            depthThreshold: 0.16, // Distance to trigger template change
            expandThreshold: 0.12  // Distance between thumb/pinky to trigger expand
        };

        let scene, camera, renderer, points;
        let targetPositions = new Float32Array(CONFIG.particleCount * 3);
        let currentModeIndex = 0;
        let globalScale = 1.0;
        let lastSwitch = 0;

        const videoElement = document.getElementById('input-video');
        const modeUI = document.getElementById('mode-ui');
        const gestureUI = document.getElementById('gesture-ui');
        const scaleUI = document.getElementById('scale-ui');

        // --- 1. Three.js Engine ---
        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 20;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            const pos = new Float32Array(CONFIG.particleCount * 3);
            const cols = new Float32Array(CONFIG.particleCount * 3);

            for (let i = 0; i < CONFIG.particleCount; i++) {
                cols[i*3] = Math.random(); 
                cols[i*3+1] = Math.random(); 
                cols[i*3+2] = 1.0;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(cols, 3));

            const material = new THREE.PointsMaterial({
                size: 0.07,
                vertexColors: true,
                blending: THREE.AdditiveBlending,
                transparent: true,
                opacity: 0.8
            });

            points = new THREE.Points(geometry, material);
            scene.add(points);
        }

        // --- 2. Math-Driven Shape Templates ---
        function buildTemplate(modeIndex, hX, hY, scaleFactor) {
            const mode = CONFIG.modes[modeIndex];
            modeUI.innerText = mode;
            
            for (let i = 0; i < CONFIG.particleCount; i++) {
                let x = 0, y = 0, z = 0;
                const i3 = i * 3;

                if (mode === 'HEART') {
                    const t = (i / CONFIG.particleCount) * Math.PI * 2;
                    x = 16 * Math.pow(Math.sin(t), 3);
                    y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                    z = (Math.random() - 0.5) * 5;
                    const s = 0.6 * scaleFactor;
                    x *= s; y *= s;
                } 
                else if (mode === 'SATURN') {
                    if (i < CONFIG.particleCount * 0.4) { // Planet
                        const u = Math.random() * Math.PI * 2;
                        const v = Math.random() * Math.PI;
                        x = 6 * Math.sin(v) * Math.cos(u) * scaleFactor;
                        y = 6 * Math.sin(v) * Math.sin(u) * scaleFactor;
                        z = 6 * Math.cos(v) * scaleFactor;
                    } else { // Rings
                        const angle = Math.random() * Math.PI * 2;
                        const r = (8 + Math.random() * 5) * scaleFactor;
                        x = r * Math.cos(angle);
                        y = (r * Math.sin(angle)) * 0.2;
                        z = r * Math.sin(angle);
                    }
                } 
                else if (mode === 'FIREWORKS') {
                    const r = Math.pow(Math.random(), 0.5) * 15 * scaleFactor;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.random() * Math.PI;
                    x = r * Math.sin(phi) * Math.cos(theta);
                    y = r * Math.sin(phi) * Math.sin(theta);
                    z = r * Math.cos(phi);
                }
                else if (mode === 'FLOWER') {
                    const t = (i / CONFIG.particleCount) * Math.PI * 20;
                    const r = (8 * Math.sin(2.5 * t)) * scaleFactor;
                    x = r * Math.cos(t);
                    y = r * Math.sin(t);
                    z = Math.sin(t * 5) * 2;
                }
                else if (mode === 'GALAXY') {
                    const angle = Math.random() * Math.PI * 2;
                    const r = Math.random() * 15 * scaleFactor;
                    x = r * Math.cos(angle + (r * 0.5));
                    y = (Math.random() - 0.5) * 2;
                    z = r * Math.sin(angle + (r * 0.5));
                }

                targetPositions[i3] = x + hX;
                targetPositions[i3+1] = y + hY;
                targetPositions[i3+2] = z;
            }
        }

        // --- 3. Gesture Detection Logic ---
        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.75 });

        hands.onResults((res) => {
            if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                const hand = res.multiHandLandmarks[0];
                
                // Position Mapping
                const hX = (0.5 - hand[9].x) * 45;
                const hY = (0.5 - hand[9].y) * 35;

                // Template Switching (Depth)
                const depth = Math.hypot(hand[0].x - hand[9].x, hand[0].y - hand[9].y);
                if (depth > CONFIG.depthThreshold && Date.now() - lastSwitch > 1500) {
                    currentModeIndex = (currentModeIndex + 1) % CONFIG.modes.length;
                    lastSwitch = Date.now();
                }

                // Expansion Logic (Open Palm)
                // Distance between thumb tip (4) and pinky tip (20)
                const span = Math.hypot(hand[4].x - hand[20].x, hand[4].y - hand[20].y);
                globalScale = span > CONFIG.expandThreshold ? 1.8 : 1.0;
                
                gestureUI.innerText = span > CONFIG.expandThreshold ? "EXPAND" : "NORMAL";
                scaleUI.innerText = globalScale.toFixed(1);

                buildTemplate(currentModeIndex, hX, hY, globalScale);
            } else {
                buildTemplate(currentModeIndex, 0, 0, 1.0);
                gestureUI.innerText = "IDLE";
            }
        });

        // --- 4. Core Loops ---
        function animate() {
            requestAnimationFrame(animate);
            if (points) {
                const pa = points.geometry.attributes.position.array;
                for (let i = 0; i < CONFIG.particleCount * 3; i++) {
                    pa[i] += (targetPositions[i] - pa[i]) * CONFIG.lerpSpeed;
                }
                points.geometry.attributes.position.needsUpdate = true;
                points.rotation.y += 0.002;
                points.rotation.x += 0.001;
            }
            renderer.render(scene, camera);
        }

        document.getElementById('start-btn').addEventListener('click', (e) => {
            e.target.style.display = 'none';
            new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            }).start();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initThree();
        animate();
    </script>
</body>
</html>
