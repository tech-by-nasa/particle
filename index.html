<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saturn Kinetic Particles - M2 Optimized</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; z-index: 10; pointer-events: none; }
        .card { background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border: 1px solid #444; width: 220px; }
        #status-text { color: #00ffcc; font-weight: bold; }
        canvas#webcam-preview { position: absolute; bottom: 20px; right: 20px; width: 160px; height: 120px; transform: scaleX(-1); border-radius: 8px; border: 1px solid #666; background: #111; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="card">
            <h2 style="margin:0 0 10px 0; font-size: 1.1rem;">🪐 Saturn Engine</h2>
            <div>Status: <span id="status-text">Loading AI...</span></div>
            <p style="font-size: 0.8rem; opacity: 0.7;">
                • Show Palm to Start<br>
                • Pinch to Form Saturn<br>
                • Open Hand to Expand
            </p>
        </div>
    </div>

    <video id="video" style="display:none" autoplay playsinline></video>
    <canvas id="webcam-preview"></canvas>

    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { HandLandmarker, FilesetResolver, DrawingUtils } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        let scene, camera, renderer, particles;
        let handLandmarker, drawingUtils;
        let video = document.getElementById('video');
        let canvasElement = document.getElementById('webcam-preview');
        let canvasCtx = canvasElement.getContext('2d');
        let statusText = document.getElementById('status-text');
        
        let lastVideoTime = -1;
        let handData = null;
        const PARTICLE_COUNT = 8000;
        const posArray = new Float32Array(PARTICLE_COUNT * 3);
        const colorArray = new Float32Array(PARTICLE_COUNT * 3);

        async function init() {
            // Three.js
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 6;
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 15;
                colorArray[i] = 1.0;
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));
            
            particles = new THREE.Points(geometry, new THREE.PointsMaterial({
                size: 0.035, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending
            }));
            scene.add(particles);

            // AI Initialization
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: { 
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                    delegate: "GPU" 
                },
                runningMode: "VIDEO",
                numHands: 1,
                minHandDetectionConfidence: 0.3, // High sensitivity
                minHandPresenceConfidence: 0.3,
                minTrackingConfidence: 0.3
            });
            drawingUtils = new DrawingUtils(canvasCtx);

            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.onloadeddata = () => predict();
            animate();
        }

        async function predict() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, performance.now());
                
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                if (results.landmarks && results.landmarks.length > 0) {
                    handData = results.landmarks[0];
                    statusText.innerText = "Tracking...";
                    // Draw landmarks on preview so you can see if the AI sees you
                    for (const landmarks of results.landmarks) {
                        drawingUtils.drawConnectors(landmarks, HandLandmarker.HAND_CONNECTIONS, { color: "#00FFCC", lineWidth: 2 });
                        drawingUtils.drawLandmarks(landmarks, { color: "#FF0000", lineWidth: 1 });
                    }
                } else {
                    handData = null;
                    statusText.innerText = "No Hand Detected";
                }
            }
            requestAnimationFrame(predict);
        }

        function animate() {
            requestAnimationFrame(animate);
            const pos = particles.geometry.attributes.position.array;
            const col = particles.geometry.attributes.color.array;
            const time = performance.now() * 0.001;

            let tx = 0, ty = 0, gesture = "IDLE";
            if (handData) {
                tx = (0.5 - handData[9].x) * 12;
                ty = (0.5 - handData[9].y) * 8;
                const d = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);
                if (d(handData[4], handData[8]) < 0.06) gesture = "SATURN";
                else if (d(handData[0], handData[12]) > 0.45) gesture = "EXPAND";
            }

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;

                if (gesture === "SATURN") {
                    if (i < PARTICLE_COUNT * 0.6) {
                        // Core Sphere
                        const phi = Math.acos(-1 + (2 * i) / (PARTICLE_COUNT * 0.6));
                        const theta = Math.sqrt(PARTICLE_COUNT * 0.6 * Math.PI) * phi;
                        const r = 1.2;
                        pos[ix] += (tx + r * Math.cos(theta) * Math.sin(phi) - pos[ix]) * 0.1;
                        pos[iy] += (ty + r * Math.sin(theta) * Math.sin(phi) - pos[iy]) * 0.1;
                        pos[iz] += (r * Math.cos(phi) - pos[iz]) * 0.1;
                        col[ix] = 1.0; col[iy] = 0.6; col[iz] = 0.2; // Orange-ish
                    } else {
                        // The Ring
                        const angle = (i / PARTICLE_COUNT) * Math.PI * 2 + time;
                        const r = 2.2 + Math.random() * 0.6;
                        const tilt = 0.5; // Saturn's Tilt
                        pos[ix] += (tx + Math.cos(angle) * r - pos[ix]) * 0.1;
                        pos[iy] += (ty + Math.sin(angle) * r * tilt - pos[iy]) * 0.1;
                        pos[iz] += (Math.sin(angle) * r * tilt - pos[iz]) * 0.1;
                        col[ix] = 0.8; col[iy] = 0.8; col[iz] = 0.9; // Dust/White
                    }
                } else if (gesture === "EXPAND") {
                    pos[ix] += (pos[ix] - tx) * 0.04;
                    pos[iy] += (pos[iy] - ty) * 0.04;
                    col[ix] = 1.0; col[iy] = 0.9; col[iz] = 0.1; // Gold
                } else {
                    // Default Floating Flow
                    pos[ix] += (tx - pos[ix]) * 0.01 + Math.sin(time + i) * 0.01;
                    pos[iy] += (ty - pos[iy]) * 0.01 + Math.cos(time + i) * 0.01;
                    col[ix] += (1 - col[ix]) * 0.02; col[iy] += (1 - col[iy]) * 0.02; col[iz] += (1 - col[iz]) * 0.02;
                }
            }

            particles.geometry.attributes.position.needsUpdate = true;
            particles.geometry.attributes.color.needsUpdate = true;
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
</html>
    </script>
</body>
</html>
