<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid Particles - M2 Optimized</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #ui { position: absolute; top: 30px; left: 30px; color: white; z-index: 10; pointer-events: none; }
        .card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); width: 250px; }
        .status-row { display: flex; align-items: center; margin-top: 10px; }
        #indicator { width: 12px; height: 12px; border-radius: 50%; background: #ff4444; margin-right: 10px; box-shadow: 0 0 10px #ff4444; }
        h1 { margin: 0; font-size: 1.2rem; letter-spacing: 1px; }
        p { font-size: 0.85rem; opacity: 0.8; margin: 5px 0; }
        canvas#webcam-preview { position: absolute; bottom: 20px; right: 20px; width: 160px; height: 120px; transform: scaleX(-1); border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); }
    </style>
</head>
<body>

    <div id="ui">
        <div class="card">
            <h1>Particle Kinetic</h1>
            <div class="status-row">
                <div id="indicator"></div>
                <span id="status-text">Starting Camera...</span>
            </div>
            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0;">
            <p><b>Open Hand:</b> Expand (Gold)</p>
            <p><b>Pinch:</b> Contract (Blue)</p>
            <p><b>Two Hands:</b> (Soon!)</p>
        </div>
    </div>

    <video id="video" style="display:none" autoplay playsinline></video>
    <canvas id="webcam-preview"></canvas>

    <script type="importmap">
    {
        "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        let scene, camera, renderer, particles;
        let handLandmarker;
        let video = document.getElementById('video');
        let indicator = document.getElementById('indicator');
        let statusText = document.getElementById('status-text');
        
        let lastVideoTime = -1;
        let handData = null;
        let lerpTarget = { x: 0, y: 0, active: false };

        const PARTICLE_COUNT = 6000;
        const posArray = new Float32Array(PARTICLE_COUNT * 3);
        const colorArray = new Float32Array(PARTICLE_COUNT * 3);

        async function init() {
            // --- Scene Setup ---
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 6;

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });

        init();
    </script>
</body>
</html>
