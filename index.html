<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Gesture Engine - Final Build</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #00ff00; font-family: 'Courier New', monospace; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        
        /* Fixed Video Feed */
        #video-container { 
            position: absolute; bottom: 25px; right: 25px; width: 240px; height: 180px; 
            border: 2px solid #00ff00; border-radius: 12px; overflow: hidden; 
            transform: scaleX(-1); background: #111; z-index: 1000;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        #hud { 
            position: absolute; top: 25px; left: 25px; background: rgba(0, 20, 0, 0.9); 
            padding: 20px; border: 1px solid #00ff00; z-index: 1000; pointer-events: none;
        }
        .label { color: #888; font-size: 10px; }
        .value { color: #fff; font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        
        #boot-screen {
            position: absolute; inset: 0; background: #000; display: flex; 
            align-items: center; justify-content: center; z-index: 9999;
        }
        #start-btn {
            padding: 25px 60px; background: #00ff00; color: #000; border: none;
            font-weight: 900; font-size: 1.5rem; cursor: pointer; border-radius: 5px;
            box-shadow: 0 0 40px #00ff00;
        }
    </style>
</head>
<body>

    <div id="boot-screen">
        <button id="start-btn">INITIALIZE SYSTEM</button>
    </div>

    <div id="hud">
        <div class="label">SYSTEM STATUS</div>
        <div class="value" id="status-ui">READY</div>
        <div class="label">ACTIVE TEMPLATE</div>
        <div class="value" id="mode-ui">HEART</div>
        <div class="label">GESTURE SCALE</div>
        <div class="value" id="scale-ui">1.0</div>
    </div>

    <div id="video-container">
        <video id="input-video" autoplay playsinline muted></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <script>
        const video = document.getElementById('input-video');
        const startBtn = document.getElementById('start-btn');
        const statusUI = document.getElementById('status-ui');
        const modeUI = document.getElementById('mode-ui');
        const scaleUI = document.getElementById('scale-ui');

        let scene, camera, renderer, points, targetPositions;
        const pCount = 15000;
        let currentMode = 0;
        let lastSwitch = 0;
        const modes = ['HEART', 'SATURN', 'FIREWORKS', 'FLOWER'];

        // --- 1. Robust Camera Initialization ---
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480, frameRate: { ideal: 30 } }
                });
                video.srcObject = stream;
                return new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve(video);
                    };
                });
            } catch (e) {
                alert("Camera Access Failed: " + e.message);
                return null;
            }
        }

        // --- 2. 3D Engine Setup ---
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 20;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(pCount * 3);
            const cols = new Float32Array(pCount * 3);
            targetPositions = new Float32Array(pCount * 3);

            for (let i = 0; i < pCount; i++) {
                cols[i*3] = 0.5 + Math.random() * 0.5;
                cols[i*3+1] = 0.2;
                cols[i*3+2] = 1.0;
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
            points = new THREE.Points(geo, new THREE.PointsMaterial({size: 0.08, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true}));
            scene.add(points);
        }

        // --- 3. Mathematical Shape Generator ---
        function updateShape(mode, hX, hY, scale = 1.0) {
            const name = modes[mode];
            modeUI.innerText = name;
            scaleUI.innerText = scale.toFixed(1);

            for (let i = 0; i < pCount; i++) {
                let x = 0, y = 0, z = 0;
                const idx = i * 3;

                if (name === 'HEART') {
                    const t = (i / pCount) * Math.PI * 2;
                    x = 16 * Math.pow(Math.sin(t), 3) * 0.6;
                    y = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * 0.6;
                } 
                else if (name === 'SATURN') {
                    if (i < pCount * 0.4) { // Ball
                        const u = Math.random() * Math.PI * 2, v = Math.random() * Math.PI;
                        x = 5 * Math.sin(v) * Math.cos(u); y = 5 * Math.sin(v) * Math.sin(u); z = 5 * Math.cos(v);
                    } else { // Rings
                        const a = Math.random() * Math.PI * 2, r = 7 + Math.random() * 5;
                        x = r * Math.cos(a); y = r * Math.sin(a) * 0.2; z = r * Math.sin(a);
                    }
                } 
                else if (name === 'FIREWORKS') {
                    const r = Math.pow(Math.random(), 0.5) * 15;
                    const th = Math.random() * Math.PI * 2, ph = Math.random() * Math.PI;
                    x = r * Math.sin(ph) * Math.cos(th); y = r * Math.sin(ph) * Math.sin(th); z = r * Math.cos(ph);
                } 
                else if (name === 'FLOWER') {
                    const t = (i / pCount) * Math.PI * 10;
                    const r = 9 * Math.sin(2.5 * t);
                    x = r * Math.cos(t); y = r * Math.sin(t);
                }

                targetPositions[idx] = (x * scale) + hX;
                targetPositions[idx+1] = (y * scale) + hY;
                targetPositions[idx+2] = z * scale;
            }
        }

        // --- 4. AI & Loop ---
        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

        hands.onResults((res) => {
            statusUI.innerText = res.multiHandLandmarks.length > 0 ? "TRACKING" : "SEARCHING...";
            let hX = 0, hY = 0, scale = 1.0;

            if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                const h = res.multiHandLandmarks[0];
                hX = (0.5 - h[9].x) * 40;
                hY = (0.5 - h[9].y) * 30;

                const depth = Math.hypot(h[0].x - h[9].x, h[0].y - h[9].y);
                const span = Math.hypot(h[4].x - h[20].x, h[4].y - h[20].y);

                if (depth > 0.18 && Date.now() - lastSwitch > 2000) {
                    currentMode = (currentMode + 1) % modes.length;
                    lastSwitch = Date.now();
                }
                scale = span > 0.15 ? 2.2 : 1.0;
                updateShape(currentMode, hX, hY, scale);
            } else {
                updateShape(currentMode, 0, 0, 1.0);
            }
        });

        async function start() {
            document.getElementById('boot-screen').style.display = 'none';
            init3D();
            await setupCamera();
            
            async function detectionLoop() {
                await hands.send({image: video});
                requestAnimationFrame(detectionLoop);
            }
            detectionLoop();
            
            function render() {
                requestAnimationFrame(render);
                const pa = points.geometry.attributes.position.array;
                for (let i = 0; i < pCount * 3; i++) {
                    pa[i] += (targetPositions[i] - pa[i]) * 0.1;
                }
                points.geometry.attributes.position.needsUpdate = true;
                points.rotation.y += 0.003;
                renderer.render(scene, camera);
            }
            render();
        }

        startBtn.addEventListener('click', start);
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
</body>
</html>
