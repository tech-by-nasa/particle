<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced 3D Particle AI</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #00ff00; font-family: 'Courier New', monospace; }
        #video-container { 
            position: absolute; bottom: 20px; right: 20px; width: 220px; height: 160px; 
            border: 2px solid #00ff00; border-radius: 12px; overflow: hidden; 
            transform: scaleX(-1); background: #111; z-index: 1000; opacity: 0.7;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        #hud { 
            position: absolute; top: 20px; left: 20px; background: rgba(0, 20, 0, 0.8); 
            padding: 15px; border: 1px solid #00ff00; z-index: 1000; pointer-events: none;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .val { color: #fff; font-weight: bold; text-shadow: 0 0 5px #00ff00; }
        #boot-screen {
            position: absolute; inset: 0; background: #000; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        #start-btn {
            padding: 20px 50px; background: transparent; color: #00ff00; border: 2px solid #00ff00;
            font-weight: 900; font-size: 1.5rem; cursor: pointer; border-radius: 4px;
            transition: 0.3s;
        }
        #start-btn:hover { background: #00ff00; color: #000; box-shadow: 0 0 50px #00ff00; }
    </style>
</head>
<body>

<div id="boot-screen">
    <h1 style="margin-bottom: 30px;">NEURAL PARTICLE ENGINE v2.0</h1>
    <button id="start-btn">INITIALIZE SYSTEM</button>
</div>

<div id="hud">
    <div>SYSTEM: <span class="val">ACTIVE</span></div>
    <div>GEOMETRY: <span id="mode-ui" class="val">HEART</span></div>
    <div>TRACKING: <span id="status-ui" class="val" style="color:red">OFFLINE</span></div>
    <div style="font-size: 0.8rem; margin-top: 10px; color: #888;">CLICK SCREEN TO CHANGE SHAPE</div>
</div>

<div id="video-container"><video id="input-video" autoplay playsinline muted></video></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
    const video = document.getElementById('input-video');
    const startBtn = document.getElementById('start-btn');
    const statusUI = document.getElementById('status-ui');
    const modeUI = document.getElementById('mode-ui');

    let scene, camera, renderer, particles, targetPositions;
    const pCount = 20000; // Increased particle density
    let currentMode = 0;
    const modes = ['HEART', 'FLOWERS', 'SATURN', 'FIREWORKS', 'DNA', 'GALAXY', 'TORUS', 'SPHERE'];

    function init3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 60;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(pCount * 3);
        const cols = new Float32Array(pCount * 3);
        targetPositions = new Float32Array(pCount * 3);

        const color = new THREE.Color();
        for (let i = 0; i < pCount; i++) {
            color.setHSL(Math.random(), 0.8, 0.5);
            cols[i * 3] = color.r;
            cols[i * 3 + 1] = color.g;
            cols[i * 3 + 2] = color.b;
        }

        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
        
        const mat = new THREE.PointsMaterial({ 
            size: 0.08, 
            vertexColors: true, 
            blending: THREE.AdditiveBlending, 
            transparent: true,
            opacity: 0.8
        });
        
        particles = new THREE.Points(geo, mat);
        scene.add(particles);
    }

    function setShape(modeIdx, hX, hY, scale = 1.0) {
        const mode = modes[modeIdx];
        modeUI.innerText = mode;

        for (let i = 0; i < pCount; i++) {
            const idx = i * 3;
            const t = (i / pCount);
            const angle = t * Math.PI * 2;
            let x = 0, y = 0, z = 0;

            switch (mode) {
                case 'HEART':
                    const th = t * Math.PI * 2;
                    x = 16 * Math.pow(Math.sin(th), 3);
                    y = (13 * Math.cos(th) - 5 * Math.cos(2 * th) - 2 * Math.cos(3 * th) - Math.cos(4 * th));
                    break;

                case 'FLOWERS':
                    const petal = 5;
                    const r = 15 * Math.sin(angle * petal);
                    x = r * Math.cos(angle);
                    y = r * Math.sin(angle);
                    z = Math.sin(angle * 10) * 2;
                    break;

                case 'SATURN':
                    if (i < pCount * 0.4) { // The Planet
                        const phi = Math.acos(-1 + (2 * i) / (pCount * 0.4));
                        const theta = Math.sqrt(pCount * 0.4 * Math.PI) * phi;
                        x = 10 * Math.cos(theta) * Math.sin(phi);
                        y = 10 * Math.sin(theta) * Math.sin(phi);
                        z = 10 * Math.cos(phi);
                    } else { // The Ring
                        const ringR = 15 + Math.random() * 8;
                        const ringA = Math.random() * Math.PI * 2;
                        x = ringR * Math.cos(ringA);
                        y = (Math.random() - 0.5) * 2;
                        z = ringR * Math.sin(ringA);
                    }
                    break;

                case 'FIREWORKS':
                    const burst = Math.floor(i / 1000);
                    const localT = (i % 1000) / 1000;
                    const speed = 15 + Math.random() * 10;
                    x = Math.cos(localT * Math.PI * 2) * Math.sin(burst) * speed;
                    y = Math.sin(localT * Math.PI * 2) * Math.sin(burst) * speed;
                    z = Math.cos(burst) * speed;
                    break;

                case 'DNA':
                    const helixH = 40;
                    const twist = 4;
                    const side = i % 2 === 0 ? 1 : -1;
                    y = (t - 0.5) * helixH;
                    x = Math.cos(y * 0.5 + (side > 0 ? 0 : Math.PI)) * 10;
                    z = Math.sin(y * 0.5 + (side > 0 ? 0 : Math.PI)) * 10;
                    break;

                case 'GALAXY':
                    const arm = i % 3;
                    const dist = Math.random() * 25;
                    const spiral = dist * 0.5;
                    x = Math.cos(spiral + (arm * Math.PI * 2 / 3)) * dist;
                    z = Math.sin(spiral + (arm * Math.PI * 2 / 3)) * dist;
                    y = (Math.random() - 0.5) * (10 / (dist + 1));
                    break;

                case 'TORUS':
                    const outerR = 15, innerR = 7;
                    const u = Math.random() * Math.PI * 2;
                    const v = Math.random() * Math.PI * 2;
                    x = (outerR + innerR * Math.cos(v)) * Math.cos(u);
                    y = (outerR + innerR * Math.cos(v)) * Math.sin(u);
                    z = innerR * Math.sin(v);
                    break;

                case 'SPHERE':
                    const sPhi = Math.acos(-1 + (2 * i) / pCount);
                    const sTheta = Math.sqrt(pCount * Math.PI) * sPhi;
                    x = 20 * Math.cos(sTheta) * Math.sin(sPhi);
                    y = 20 * Math.sin(sTheta) * Math.sin(sPhi);
                    z = 20 * Math.cos(sPhi);
                    break;
            }
            targetPositions[idx] = (x * scale) + hX;
            targetPositions[idx + 1] = (y * scale) + hY;
            targetPositions[idx + 2] = z * scale;
        }
    }

    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6 });

    hands.onResults((res) => {
        if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
            statusUI.innerText = "ONLINE"; statusUI.style.color = "#00ff00";
            const h = res.multiHandLandmarks[0];
            const hX = (0.5 - h[9].x) * 60;
            const hY = (0.5 - h[9].y) * 50;
            const span = Math.hypot(h[4].x - h[20].x, h[4].y - h[20].y);
            setShape(currentMode, hX, hY, span > 0.18 ? 2.2 : 1.0);
        } else {
            statusUI.innerText = "SEARCHING"; statusUI.style.color = "orange";
            setShape(currentMode, 0, 0, 1.0);
        }
    });

    async function forceStart() {
        document.getElementById('boot-screen').style.display = 'none';
        init3D();
        
        window.addEventListener('mousedown', () => {
            currentMode = (currentMode + 1) % modes.length;
        });

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            
            const tick = async () => {
                if (video.readyState >= 2) await hands.send({ image: video });
                requestAnimationFrame(tick);
            };
            tick();

            function render() {
                requestAnimationFrame(render);
                const pa = particles.geometry.attributes.position.array;
                for (let i = 0; i < pCount * 3; i++) {
                    pa[i] += (targetPositions[i] - pa[i]) * 0.08; // Smoother lerp
                }
                particles.geometry.attributes.position.needsUpdate = true;
                particles.rotation.y += 0.005;
                renderer.render(scene, camera);
            }
            render();
        } catch (e) { alert("Access Denied: " + e.message); }
    }

    startBtn.addEventListener('click', forceStart);
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
</body>
</html>
