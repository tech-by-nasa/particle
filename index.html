<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid Particles - M2 Optimized</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #ui { position: absolute; top: 30px; left: 30px; color: white; z-index: 10; pointer-events: none; }
        .card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); width: 250px; }
        .status-row { display: flex; align-items: center; margin-top: 10px; }
        #indicator { width: 12px; height: 12px; border-radius: 50%; background: #ff4444; margin-right: 10px; box-shadow: 0 0 10px #ff4444; }
        h1 { margin: 0; font-size: 1.2rem; letter-spacing: 1px; }
        p { font-size: 0.85rem; opacity: 0.8; margin: 5px 0; }
        canvas#webcam-preview { position: absolute; bottom: 20px; right: 20px; width: 160px; height: 120px; transform: scaleX(-1); border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); }
    </style>
</head>
<body>

    <div id="ui">
        <div class="card">
            <h1>Particle Kinetic</h1>
            <div class="status-row">
                <div id="indicator"></div>
                <span id="status-text">Starting Camera...</span>
            </div>
            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0;">
            <p><b>Open Hand:</b> Expand (Gold)</p>
            <p><b>Pinch:</b> Contract (Blue)</p>
            <p><b>Two Hands:</b> (Soon!)</p>
        </div>
    </div>

    <video id="video" style="display:none" autoplay playsinline></video>
    <canvas id="webcam-preview"></canvas>

    <script type="importmap">
    {
        "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        let scene, camera, renderer, particles;
        let handLandmarker;
        let video = document.getElementById('video');
        let indicator = document.getElementById('indicator');
        let statusText = document.getElementById('status-text');
        
        let lastVideoTime = -1;
        let handData = null;
        let lerpTarget = { x: 0, y: 0, active: false };

        const PARTICLE_COUNT = 6000;
        const posArray = new Float32Array(PARTICLE_COUNT * 3);
        const colorArray = new Float32Array(PARTICLE_COUNT * 3);

        async function init() {
            // --- Scene Setup ---
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 6;

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 12;
                colorArray[i] = Math.random();
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));
            
            const material = new THREE.PointsMaterial({
                size: 0.04,
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending,
                opacity: 0.7
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            // --- AI Setup ---
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: { 
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                    delegate: "GPU" 
                },
                runningMode: "VIDEO",
                numHands: 1
            });

            startWebcam();
            animate();
        }

        async function startWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;
                video.onloadeddata = () => {
                    statusText.innerText = "No Hand Detected";
                    predict();
                };
            } catch (err) {
                statusText.innerText = "Camera Error";
            }
        }

        async function predict() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, performance.now());
                if (results.landmarks && results.landmarks.length > 0) {
                    handData = results.landmarks[0];
                    indicator.style.background = "#00ffcc";
                    indicator.style.boxShadow = "0 0 10px #00ffcc";
                    lerpTarget.active = true;
                } else {
                    handData = null;
                    indicator.style.background = "#ff4444";
                    indicator.style.boxShadow = "0 0 10px #ff4444";
                    lerpTarget.active = false;
                }
            }
            requestAnimationFrame(predict);
        }

        function animate() {
            requestAnimationFrame(animate);

            const positions = particles.geometry.attributes.position.array;
            const colors = particles.geometry.attributes.color.array;
            const time = performance.now() * 0.001;

            let gesture = "NONE";
            let tx = 0, ty = 0;

            if (handData) {
                // Smoothing the hand movement
                tx = (0.5 - handData[9].x) * 12;
                ty = (0.5 - handData[9].y) * 8;
                
                // Sensitivity Thresholds
                const thumb = handData[4];
                const index = handData[8];
                const middle = handData[12];
                const wrist = handData[0];
                const d = (p1, p2) => Math.hypot(p1.x-p2.x, p1.y-p2.y);
                
                if (d(thumb, index) < 0.06) gesture = "PINCH";
                else if (d(wrist, middle) > 0.4) gesture = "OPEN";
                else gesture = "MOVE";
                
                statusText.innerText = gesture;
            } else {
                statusText.innerText = "Looking for hand...";
            }

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;

                // 1. Idle Motion (sine wave drift) so it never looks frozen
                positions[ix] += Math.sin(time + i) * 0.002;
                positions[iy] += Math.cos(time + i) * 0.002;

                if (handData) {
                    // 2. Attraction to hand
                    positions[ix] += (tx - positions[ix]) * 0.02;
                    positions[iy] += (ty - positions[iy]) * 0.02;

                    // 3. Gesture Physics
                    if (gesture === "PINCH") {
                        positions[ix] *= 0.96; positions[iy] *= 0.96;
                        colors[ix] = 0.2; colors[iy] = 0.4; colors[iz] = 1.0; // Blue
                    } else if (gesture === "OPEN") {
                        positions[ix] += (positions[ix] - tx) * 0.08;
                        positions[iy] += (positions[iy] - ty) * 0.08;
                        colors[ix] = 1.0; colors[iy] = 0.7; colors[iz] = 0.1; // Gold
                    } else {
                        // Soft fade back to white/pink
                        colors[ix] += (0.8 - colors[ix]) * 0.05;
                        colors[iy] += (0.8 - colors[iy]) * 0.05;
                        colors[iz] += (1.0 - colors[iz]) * 0.05;
                    }
                }
            }

            particles.geometry.attributes.position.needsUpdate = true;
            particles.geometry.attributes.color.needsUpdate = true;
            
            // Camera subtle tilt
            camera.position.x += (tx/5 - camera.position.x) * 0.05;
            camera.lookAt(0,0,0);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
    </script>
</body>
</html>
