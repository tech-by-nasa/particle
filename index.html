<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Engine V5 - Stable Build</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #00ff00; font-family: 'Courier New', monospace; }
        #video-container { 
            position: absolute; bottom: 20px; right: 20px; width: 200px; height: 150px; 
            border: 2px solid #00ff00; border-radius: 10px; overflow: hidden; 
            transform: scaleX(-1); background: #111; z-index: 1000;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        #start-btn { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; background: #00ff00; color: #000; border: none;
            font-weight: bold; font-size: 18px; cursor: pointer; z-index: 2000;
        }
        #console {
            position: absolute; top: 20px; left: 20px; width: 300px;
            background: rgba(0, 20, 0, 0.9); padding: 15px; border: 1px solid #00ff00;
            font-size: 12px; pointer-events: none; line-height: 1.4;
        }
        .status-ok { color: #00ff00; }
        .status-err { color: #ff0000; font-weight: bold; }
    </style>
</head>
<body>

    <button id="start-btn">BOOT SYSTEM & ALLOW CAMERA</button>

    <div id="console">
        <div style="font-size: 16px; border-bottom: 1px solid #00ff00; margin-bottom: 10px;">ENGINE DIAGNOSTICS</div>
        <div>Three.js: <span id="st-three" class="status-err">OFFLINE</span></div>
        <div>MediaPipe: <span id="st-mp" class="status-err">OFFLINE</span></div>
        <div>Camera: <span id="st-cam" class="status-err">OFFLINE</span></div>
        <div>Active Shape: <span id="st-shape" style="color:white">NONE</span></div>
    </div>

    <div id="video-container"><video id="input-video" playsinline></video></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const videoElement = document.getElementById('input-video');
        const startBtn = document.getElementById('start-btn');
        
        // Diagnostic Elements
        const stThree = document.getElementById('st-three');
        const stMP = document.getElementById('st-mp');
        const stCam = document.getElementById('st-cam');
        const stShape = document.getElementById('st-shape');

        let scene, camera, renderer, points, targetPositions;
        const pCount = 12000;
        let currentMode = 0;
        const modes = ['HEART', 'SATURN', 'FIREWORKS', 'FLOWER'];

        // 1. Initialize 3D Environment
        try {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 20;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(pCount * 3);
            const cols = new Float32Array(pCount * 3);
            targetPositions = new Float32Array(pCount * 3);

            for (let i = 0; i < pCount; i++) {
                cols[i*3] = Math.random(); cols[i*3+1] = 0.5; cols[i*3+2] = 1;
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
            points = new THREE.Points(geo, new THREE.PointsMaterial({size: 0.07, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true}));
            scene.add(points);
            
            stThree.innerText = "ONLINE";
            stThree.className = "status-ok";
        } catch(e) { console.error(e); }

        // 2. Shape Generator Logic
        function setShape(mode, hX, hY, scale = 1) {
            stShape.innerText = modes[mode];
            for (let i = 0; i < pCount; i++) {
                let x = 0, y = 0, z = 0;
                const idx = i * 3;
                if (mode === 0) { // Heart
                    const t = (i / pCount) * Math.PI * 2;
                    x = 16 * Math.pow(Math.sin(t), 3);
                    y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                    x *= 0.6; y *= 0.6;
                } else if (mode === 1) { // Saturn
                    if (i < pCount * 0.4) {
                        const u = Math.random() * Math.PI * 2, v = Math.random() * Math.PI;
                        x = 5 * Math.sin(v) * Math.cos(u); y = 5 * Math.sin(v) * Math.sin(u); z = 5 * Math.cos(v);
                    } else {
                        const a = Math.random() * Math.PI * 2, r = 7 + Math.random() * 4;
                        x = r * Math.cos(a); y = (r * Math.sin(a)) * 0.2; z = r * Math.sin(a);
                    }
                } else if (mode === 2) { // Fireworks
                    const r = Math.random() * 15;
                    const theta = Math.random() * Math.PI * 2, phi = Math.random() * Math.PI;
                    x = r * Math.sin(phi) * Math.cos(theta); y = r * Math.sin(phi) * Math.sin(theta); z = r * Math.cos(phi);
                } else { // Flower
                    const t = (i / pCount) * Math.PI * 10;
                    const r = 8 * Math.sin(2.5 * t);
                    x = r * Math.cos(t); y = r * Math.sin(t);
                }
                targetPositions[idx] = (x * scale) + hX;
                targetPositions[idx+1] = (y * scale) + hY;
                targetPositions[idx+2] = z * scale;
            }
        }

        // 3. MediaPipe & Camera Activation
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });
        
        let lastSwitch = 0;
        hands.onResults((res) => {
            stMP.innerText = "TRACKING"; stMP.className = "status-ok";
            if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                const h = res.multiHandLandmarks[0];
                const hX = (0.5 - h[9].x) * 40;
                const hY = (0.5 - h[9].y) * 30;
                
                // Detection: Depth (Z) & Expansion
                const depth = Math.hypot(h[0].x - h[9].x, h[0].y - h[9].y);
                const span = Math.hypot(h[4].x - h[20].x, h[4].y - h[20].y);
                
                if (depth > 0.18 && Date.now() - lastSwitch > 2000) {
                    currentMode = (currentMode + 1) % modes.length;
                    lastSwitch = Date.now();
                }
                const scale = span > 0.15 ? 2.0 : 1.0;
                setShape(currentMode, hX, hY, scale);
            }
        });

        startBtn.addEventListener('click', async () => {
            startBtn.innerText = "STARTING...";
            try {
                const camera = new Camera(videoElement, {
                    onFrame: async () => { await hands.send({image: videoElement}); },
                    width: 640, height: 480
                });
                await camera.start();
                startBtn.style.display = 'none';
                stCam.innerText = "ACTIVE"; stCam.className = "status-ok";
            } catch (err) {
                stCam.innerText = "ERROR: " + err.message;
                alert("Camera access denied or not found.");
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            if (points) {
                const pa = points.geometry.attributes.position.array;
                for (let i = 0; i < pCount * 3; i++) {
                    pa[i] += (targetPositions[i] - pa[i]) * 0.1;
                }
                points.geometry.attributes.position.needsUpdate = true;
                points.rotation.y += 0.002;
            }
            renderer.render(scene, camera);
        }

        setShape(0, 0, 0);
        animate();
    </script>
</body>
</html>
</body>
</html>
