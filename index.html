<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Gesture Particle Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #00ff00; font-family: 'Courier New', monospace; }
        #video-container { 
            position: absolute; bottom: 20px; right: 20px; width: 220px; height: 160px; 
            border: 2px solid #00ff00; border-radius: 12px; overflow: hidden; 
            transform: scaleX(-1); background: #111; z-index: 1000; opacity: 0.4;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        #hud { 
            position: absolute; top: 20px; left: 20px; background: rgba(0, 10, 0, 0.9); 
            padding: 20px; border: 1px solid #00ff00; z-index: 1000; pointer-events: none;
        }
        .val { color: #fff; font-weight: bold; text-shadow: 0 0 8px #00ff00; }
        #boot-screen {
            position: absolute; inset: 0; background: #000; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        #start-btn {
            padding: 20px 50px; background: transparent; color: #00ff00; border: 2px solid #00ff00;
            font-weight: 900; font-size: 1.5rem; cursor: pointer; border-radius: 4px;
        }
        .status-light { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: red; margin-right: 5px; }
    </style>
</head>
<body>

<div id="boot-screen">
    <h1 style="margin-bottom: 20px;">QUANTUM GESTURE ENGINE v4.0</h1>
    <button id="start-btn">ENGAGE SYSTEMS</button>
</div>

<div id="hud">
    <div>GEOMETRY: <span id="mode-ui" class="val">INITIALIZING</span></div>
    <div>PARTICLES: <span class="val">45,000</span></div>
    <div>GESTURE: <span id="gesture-ui" class="val">SCANNING</span></div>
</div>

<div id="video-container"><video id="input-video" autoplay playsinline muted></video></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
    const video = document.getElementById('input-video');
    const startBtn = document.getElementById('start-btn');
    const modeUI = document.getElementById('mode-ui');
    const gestureUI = document.getElementById('gesture-ui');

    let scene, camera, renderer, particles, targetPositions;
    const pCount = 45000; // Expanded to 45k
    let currentMode = 0;
    const modes = ['HEART', 'DNA', 'SATURN', 'FIREWORKS', 'FLOWER', 'GALAXY', 'SPHERE', 'TORUS'];
    
    let spinSpeed = 0.01;
    let lastSwitch = 0;

    function init3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 70;

        renderer = new THREE.WebGLRenderer({ antialias: false }); // Disable for 45k performance
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(pCount * 3);
        const cols = new Float32Array(pCount * 3);
        targetPositions = new Float32Array(pCount * 3);

        const color = new THREE.Color();
        for (let i = 0; i < pCount; i++) {
            color.setHSL((i / pCount) * 0.1 + 0.5, 0.9, 0.5); 
            cols[i * 3] = color.r; cols[i * 3 + 1] = color.g; cols[i * 3 + 2] = color.b;
            pos[i*3] = (Math.random()-0.5)*200; pos[i*3+1] = (Math.random()-0.5)*200; pos[i*3+2] = (Math.random()-0.5)*200;
        }

        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
        particles = new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.06, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true }));
        scene.add(particles);
    }

    function setShape(modeIdx, hX, hY, scale = 1.0) {
        modeUI.innerText = modes[modeIdx];
        for (let i = 0; i < pCount; i++) {
            const idx = i * 3;
            const t = (i / pCount);
            const a = t * Math.PI * 2;
            let x = 0, y = 0, z = 0;

            switch (modes[modeIdx]) {
                case 'HEART':
                    x = 16 * Math.pow(Math.sin(a), 3);
                    y = (13 * Math.cos(a) - 5 * Math.cos(2*a) - 2 * Math.cos(3*a) - Math.cos(4*a));
                    break;
                case 'DNA':
                    y = (t - 0.5) * 50;
                    const phase = i % 2 === 0 ? 0 : Math.PI;
                    x = Math.cos(y * 0.5 + phase) * 12;
                    z = Math.sin(y * 0.5 + phase) * 12;
                    break;
                case 'SATURN':
                    if (i < pCount * 0.4) { // Planet
                        const phi = Math.acos(-1 + (2 * i) / (pCount * 0.4));
                        const theta = Math.sqrt(pCount * 0.4 * Math.PI) * phi;
                        x = 12 * Math.cos(theta) * Math.sin(phi);
                        y = 12 * Math.sin(theta) * Math.sin(phi);
                        z = 12 * Math.cos(phi);
                    } else { // Huge Ring
                        const rr = 18 + Math.random() * 10;
                        x = rr * Math.cos(a * 15); z = rr * Math.sin(a * 15);
                    }
                    break;
                case 'FIREWORKS':
                    const speed = 25 * (i % 100 / 100);
                    x = Math.cos(a * 20) * speed; y = Math.sin(a * 20) * speed; z = Math.cos(t * 10) * speed;
                    break;
                case 'GALAXY':
                    const arm = i % 4;
                    const d = Math.random() * 30;
                    x = Math.cos(d*0.4 + (arm * Math.PI/2)) * d;
                    z = Math.sin(d*0.4 + (arm * Math.PI/2)) * d;
                    y = (Math.random()-0.5) * (50/(d+1));
                    break;
                default: // Sphere
                    const sPhi = Math.acos(-1 + (2 * i) / pCount);
                    const sTheta = Math.sqrt(pCount * Math.PI) * sPhi;
                    x = 22 * Math.cos(sTheta) * Math.sin(sPhi);
                    y = 22 * Math.sin(sTheta) * Math.sin(sPhi);
                    z = 22 * Math.cos(sPhi);
            }
            targetPositions[idx] = (x * scale) + hX;
            targetPositions[idx+1] = (y * scale) + hY;
            targetPositions[idx+2] = z * scale;
        }
    }

    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7 });

    hands.onResults((res) => {
        const hRes = res.multiHandLandmarks;
        if (hRes && hRes.length > 0) {
            const h1 = hRes[0];
            
            // 1. GESTURE: Mode Switch (Open Palm)
            const openPalm = h1[8].y < h1[6].y && h1[12].y < h1[10].y && h1[20].y < h1[18].y;
            if (openPalm && Date.now() - lastSwitch > 1200) {
                currentMode = (currentMode + 1) % modes.length;
                lastSwitch = Date.now();
                gestureUI.innerText = "MODE CYCLE";
            }

            // 2. GESTURE: Spin (Wrist Rotation approximation)
            const wristRot = Math.abs(h1[4].x - h1[20].x);
            spinSpeed = 0.005 + (wristRot * 0.1);

            // 3. GESTURE: Expansion
            let scaleFactor = 1.0;
            let hX = 0, hY = 0;

            if (hRes.length === 2) {
                const h2 = hRes[1];
                const dist = Math.hypot(h1[9].x - h2[9].x, h1[9].y - h2[9].y);
                scaleFactor = dist * 5; // Expand based on hand distance
                hX = (0.5 - (h1[9].x + h2[9].x)/2) * 60;
                hY = (0.5 - (h1[9].y + h2[9].y)/2) * 50;
                gestureUI.innerText = "HYPER-EXPAND";
            } else {
                hX = (0.5 - h1[9].x) * 60;
                hY = (0.5 - h1[9].y) * 50;
                gestureUI.innerText = "TRACKING";
            }

            setShape(currentMode, hX, hY, scaleFactor);
        } else {
            gestureUI.innerText = "IDLE";
            setShape(currentMode, 0, 0, 0.4);
        }
    });

    async function forceStart() {
        document.getElementById('boot-screen').style.display = 'none';
        init3D();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            const tick = async () => {
                if (video.readyState >= 2) await hands.send({ image: video });
                requestAnimationFrame(tick);
            };
            tick();

            function render() {
                requestAnimationFrame(render);
                const pa = particles.geometry.attributes.position.array;
                for (let i = 0; i < pCount * 3; i++) pa[i] += (targetPositions[i] - pa[i]) * 0.12;
                particles.geometry.attributes.position.needsUpdate = true;
                particles.rotation.y += spinSpeed;
                renderer.render(scene, camera);
            }
            render();
        } catch (e) { alert("Camera Access Error"); }
    }

    startBtn.addEventListener('click', forceStart);
</script>
</body>
</html>
