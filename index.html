<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titan Particle Engine V6</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #00ff00; font-family: 'Courier New', monospace; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        #video-container { 
            position: absolute; bottom: 25px; right: 25px; width: 260px; height: 180px; 
            border: 2px solid #00ff00; border-radius: 12px; overflow: hidden; 
            transform: scaleX(-1); background: #111; z-index: 1000;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.5);
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        #hud { 
            position: absolute; top: 25px; left: 25px; background: rgba(0, 15, 0, 0.9); 
            padding: 20px; border: 1px solid #00ff00; z-index: 1000; pointer-events: none;
            min-width: 200px;
        }
        .val { color: #fff; font-weight: bold; font-size: 1.2rem; }
        #boot-screen {
            position: absolute; inset: 0; background: #000; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        #start-btn {
            padding: 30px 60px; background: #00ff00; color: #000; border: none;
            font-weight: 900; font-size: 1.8rem; cursor: pointer; border-radius: 8px;
            box-shadow: 0 0 50px #00ff00; transition: 0.3s;
        }
        #start-btn:hover { transform: scale(1.1); background: #fff; }
    </style>
</head>
<body>

    <div id="boot-screen">
        <h1 style="margin-bottom: 40px; letter-spacing: 10px;">TITAN V6 ENGINE</h1>
        <button id="start-btn">ENGAGE AI</button>
    </div>

    <div id="hud">
        <div style="color:#888; font-size:10px;">ACTIVE TEMPLATE</div>
        <div class="val" id="mode-ui">HEART</div>
        <div style="color:#888; font-size:10px; margin-top:10px;">PARTICLE VELOCITY</div>
        <div class="val" id="speed-ui">0.0</div>
        <div style="color:#888; font-size:10px; margin-top:10px;">GESTURE</div>
        <div class="val" id="gest-ui">IDLE</div>
    </div>

    <div id="video-container"><video id="input-video" autoplay playsinline muted></video></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <script>
        const video = document.getElementById('input-video');
        const startBtn = document.getElementById('start-btn');
        const modeUI = document.getElementById('mode-ui');
        const speedUI = document.getElementById('speed-ui');
        const gestUI = document.getElementById('gest-ui');

        let scene, camera, renderer, points, targetPositions;
        const pCount = 35000; // THOUSANDS MORE PARTICLES
        let currentMode = 0;
        let spinSpeed = 0;
        let lastHandPos = {x: 0, y: 0};
        
        const modes = ['HEART', 'SATURN', 'FIREWORKS', 'FLOWER', 'FOX_NEBULA', 'SKULL_VOID', 'ZODIAC_STAR'];

        // --- 1. Engine Core ---
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 25;

            renderer = new THREE.WebGLRenderer({ antialias: false }); // Better performance for high count
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(pCount * 3);
            const cols = new Float32Array(pCount * 3);
            targetPositions = new Float32Array(pCount * 3);

            for (let i = 0; i < pCount; i++) {
                cols[i*3] = Math.random(); 
                cols[i*3+1] = Math.random() * 0.5; 
                cols[i*3+2] = 1.0;
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
            points = new THREE.Points(geo, new THREE.PointsMaterial({
                size: 0.04, 
                vertexColors: true, 
                blending: THREE.AdditiveBlending, 
                transparent: true,
                opacity: 0.6
            }));
            scene.add(points);
        }

        // --- 2. Advanced Shape Math ---
        function setShape(mode, hX, hY, scale = 1.0) {
            const name = modes[mode];
            modeUI.innerText = name;

            for (let i = 0; i < pCount; i++) {
                let x = 0, y = 0, z = 0;
                const idx = i * 3;

                if (name === 'HEART') {
                    const t = (i / pCount) * Math.PI * 2;
                    x = 16 * Math.pow(Math.sin(t), 3);
                    y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                    z = (Math.random() - 0.5) * 4;
                } 
                else if (name === 'SATURN') {
                    if (i < pCount * 0.3) { // Core Planet
                        const u = Math.random() * Math.PI * 2, v = Math.random() * Math.PI;
                        x = 6 * Math.sin(v) * Math.cos(u); y = 6 * Math.sin(v) * Math.sin(u); z = 6 * Math.cos(v);
                    } else { // High Density Rings
                        const a = Math.random() * Math.PI * 2, r = 8 + Math.random() * 6;
                        x = r * Math.cos(a); y = (r * Math.sin(a)) * 0.15; z = r * Math.sin(a);
                    }
                } 
                else if (name === 'FIREWORKS') {
                    const r = Math.pow(Math.random(), 0.2) * 20; // Fast expansion look
                    const th = Math.random() * Math.PI * 2, ph = Math.random() * Math.PI;
                    x = r * Math.sin(ph) * Math.cos(th); y = r * Math.sin(ph) * Math.sin(th); z = r * Math.cos(ph);
                }
                else if (name === 'SKULL_VOID') {
                    const u = Math.random() * Math.PI * 2, v = Math.random() * Math.PI;
                    x = 7 * Math.sin(v) * Math.cos(u);
                    y = 9 * Math.cos(v);
                    z = 6 * Math.sin(v) * Math.sin(u);
                    if (y > 2 && Math.abs(x) < 2) { x *= 1.5; z *= 1.5; } // Eye socket holes
                }
                else if (name === 'FOX_NEBULA') {
                    const t = (i / pCount) * Math.PI * 2;
                    x = 10 * Math.cos(t) * Math.sin(t*0.5);
                    y = 8 * Math.sin(t) * Math.cos(t*2);
                    z = Math.sin(t*5) * 5;
                }
                else { // Star Sign / Zodiac
                    const r = 10 + Math.sin(i * 0.1) * 2;
                    const a = (i / pCount) * Math.PI * 12;
                    x = r * Math.cos(a); y = r * Math.sin(a); z = Math.random() * 2;
                }

                targetPositions[idx] = (x * scale) + hX;
                targetPositions[idx+1] = (y * scale) + hY;
                targetPositions[idx+2] = z * scale;
            }
        }

        // --- 3. Hand Gesture System ---
        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

        let lastSwitch = 0;
        hands.onResults((res) => {
            if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                const h = res.multiHandLandmarks[0];
                const hX = (0.5 - h[9].x) * 50;
                const hY = (0.5 - h[9].y) * 40;

                // 1. Detection for SPIN gesture (Speed of movement)
                const dx = h[9].x - lastHandPos.x;
                const dy = h[9].y - lastHandPos.y;
                const speed = Math.sqrt(dx*dx + dy*dy);
                spinSpeed = speed * 15; 
                speedUI.innerText = spinSpeed.toFixed(2);
                lastHandPos = {x: h[9].x, y: h[9].y};

                // 2. Detection for DEPTH (Template Switch)
                const depth = Math.hypot(h[0].x - h[9].x, h[0].y - h[9].y);
                if (depth > 0.22 && Date.now() - lastSwitch > 2500) {
                    currentMode = (currentMode + 1) % modes.length;
                    lastSwitch = Date.now();
                }

                // 3. Detection for EXPAND (Open Palm)
                const span = Math.hypot(h[4].x - h[20].x, h[4].y - h[20].y);
                const scale = span > 0.18 ? 2.5 : 1.0;
                gestUI.innerText = span > 0.18 ? "EXPAND" : "NORMAL";

                setShape(currentMode, hX, hY, scale);
            } else {
                setShape(currentMode, 0, 0, 1.0);
                spinSpeed *= 0.95; // Decay spin
            }
        });

        async function start() {
            document.getElementById('boot-screen').style.display = 'none';
            init3D();
            const stream = await navigator.mediaDevices.getUserMedia({video: true});
            video.srcObject = stream;
            
            // AI Loop
            async function aiLoop() {
                await hands.send({image: video});
                requestAnimationFrame(aiLoop);
            }
            aiLoop();
            
            // Render Loop
            function render() {
                requestAnimationFrame(render);
                const pa = points.geometry.attributes.position.array;
                for (let i = 0; i < pCount * 3; i++) {
                    pa[i] += (targetPositions[i] - pa[i]) * 0.15;
                }
                points.geometry.attributes.position.needsUpdate = true;
                
                // DYNAMIC SPIN: The more you move your hand, the faster it spins
                points.rotation.y += 0.005 + (spinSpeed * 0.1);
                points.rotation.z += (spinSpeed * 0.05);

                renderer.render(scene, camera);
            }
            render();
        }

        startBtn.addEventListener('click', start);
    </script>
</body>
</html>
</body>
</html>
