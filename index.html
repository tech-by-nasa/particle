<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Engine: Fireworks Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; z-index: 10; pointer-events: none; }
        .card { background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; border: 1px solid #444; width: 260px; backdrop-filter: blur(5px); }
        #status-text { color: #00ffcc; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        canvas#webcam-preview { position: absolute; bottom: 20px; right: 20px; width: 180px; height: 135px; transform: scaleX(-1); border-radius: 8px; border: 1px solid #555; background: #111; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="card">
            <h2 style="margin:0 0 10px 0; font-size: 1.1rem; color: #ffcc00;">🎆 Particle Engine v4</h2>
            <div>Current: <span id="status-text">Init...</span></div>
            <p style="font-size: 0.75rem; opacity: 0.8; line-height: 1.5; margin-top: 10px;">
                • <b>CLAP:</b> Fireworks Explosion 🎆<br>
                • <b>2-Hand Heart:</b> Heart Shape ❤️<br>
                • <b>1-Hand Pinch:</b> Saturn Shape 🪐<br>
                • <b>1-Hand Open:</b> Gravity Expansion
            </p>
        </div>
    </div>

    <video id="video" style="display:none" autoplay playsinline></video>
    <canvas id="webcam-preview"></canvas>

    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { HandLandmarker, FilesetResolver, DrawingUtils } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        let scene, camera, renderer, particles;
        let handLandmarker, drawingUtils;
        let video = document.getElementById('video');
        let canvasElement = document.getElementById('webcam-preview');
        let canvasCtx = canvasElement.getContext('2d');
        let statusText = document.getElementById('status-text');
        
        let lastVideoTime = -1;
        let allHandsData = [];
        const PARTICLE_COUNT = 8000;
        
        // Particle Data Arrays
        const posArray = new Float32Array(PARTICLE_COUNT * 3);
        const velArray = new Float32Array(PARTICLE_COUNT * 3); // For Fireworks physics
        const colorArray = new Float32Array(PARTICLE_COUNT * 3);

        let gestureMode = "IDLE";
        let fireworkLife = 0;

        async function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 8;
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 20;
                velArray[i] = 0;
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));
            
            particles = new THREE.Points(geometry, new THREE.PointsMaterial({
                size: 0.045, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending
            }));
            scene.add(particles);

            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: { 
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                    delegate: "GPU" 
                },
                runningMode: "VIDEO", numHands: 2,
                minHandDetectionConfidence: 0.4, minHandPresenceConfidence: 0.4
            });
            drawingUtils = new DrawingUtils(canvasCtx);

            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.onloadeddata = () => predict();
            animate();
        }

        async function predict() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, performance.now());
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                allHandsData = results.landmarks || [];
                if (allHandsData.length > 0) {
                    for (const landmarks of allHandsData) {
                        drawingUtils.drawConnectors(landmarks, HandLandmarker.HAND_CONNECTIONS, { color: "#00FFCC", lineWidth: 2 });
                        drawingUtils.drawLandmarks(landmarks, { color: "#FFFFFF", radius: 1 });
                    }
                }
            }
            requestAnimationFrame(predict);
        }

        function triggerFirework(tx, ty) {
            gestureMode = "FIREWORK";
            fireworkLife = 1.0;
            const pos = particles.geometry.attributes.position.array;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
                pos[ix] = tx; pos[iy] = ty; pos[iz] = 0;
                // Random explosion velocity
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(Math.random() * 2 - 1);
                const speed = 0.1 + Math.random() * 0.4;
                velArray[ix] = speed * Math.sin(phi) * Math.cos(theta);
                velArray[iy] = speed * Math.sin(phi) * Math.sin(theta);
                velArray[iz] = speed * Math.cos(phi);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const pos = particles.geometry.attributes.position.array;
            const col = particles.geometry.attributes.color.array;
            const time = performance.now() * 0.001;

            let tx = 0, ty = 0;
            let currentGesture = "IDLE";

            if (allHandsData.length === 2) {
                const h1 = allHandsData[0], h2 = allHandsData[1];
                const d = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);
                tx = (0.5 - (h1[9].x + h2[9].x)/2) * 12;
                ty = (0.5 - (h1[9].y + h2[9].y)/2) * 8;

                const palmDist = d(h1[9], h2[9]);
                const indexDist = d(h1[8], h2[8]);
                
                if (palmDist < 0.12) { // CLAP DETECTED
                    if (gestureMode !== "FIREWORK") triggerFirework(tx, ty);
                    currentGesture = "FIREWORK";
                } else if (indexDist < 0.1 && d(h1[4], h2[4]) < 0.1) {
                    currentGesture = "HEART";
                    gestureMode = "HEART";
                }
            } else if (allHandsData.length === 1) {
                const h = allHandsData[0];
                tx = (0.5 - h[9].x) * 12; ty = (0.5 - h[9].y) * 8;
                const d = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);
                if (d(h[4], h[8]) < 0.06) gestureMode = "SATURN";
                else if (d(h[0], h[12]) > 0.45) gestureMode = "EXPAND";
                else gestureMode = "IDLE";
                currentGesture = gestureMode;
            }

            statusText.innerText = currentGesture;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;

                if (gestureMode === "FIREWORK" && fireworkLife > 0) {
                    pos[ix] += velArray[ix];
                    pos[iy] += velArray[iy];
                    pos[iz] += velArray[iz];
                    velArray[iy] -= 0.005; // Gravity
                    col[ix] = Math.random(); col[iy] = Math.random(); col[iz] = 1.0;
                    if (i === 0) fireworkLife -= 0.001;
                } 
                else if (gestureMode === "HEART") {
                    const t = (i / PARTICLE_COUNT) * Math.PI * 2;
                    const hx = 0.18 * (16 * Math.pow(Math.sin(t), 3));
                    const hy = 0.18 * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                    pos[ix] += (tx + hx - pos[ix]) * 0.1;
                    pos[iy] += (ty + hy - pos[iy]) * 0.1;
                    pos[iz] += (0 - pos[iz]) * 0.1;
                    col[ix] = 1.0; col[iy] = 0.1; col[iz] = 0.3;
                } 
                else if (gestureMode === "SATURN") {
                    const isPlanet = i < PARTICLE_COUNT * 0.6;
                    if (isPlanet) {
                        const phi = Math.acos(-1 + (2 * i) / (PARTICLE_COUNT * 0.6));
                        const theta = Math.sqrt(PARTICLE_COUNT * 0.6 * Math.PI) * phi;
                        pos[ix] += (tx + 1.2 * Math.cos(theta) * Math.sin(phi) - pos[ix]) * 0.1;
                        pos[iy] += (ty + 1.2 * Math.sin(theta) * Math.sin(phi) - pos[iy]) * 0.1;
                        pos[iz] += (1.2 * Math.cos(phi) - pos[iz]) * 0.1;
                        col[ix] = 1.0; col[iy] = 0.7; col[iz] = 0.3;
                    } else {
                        const angle = (i / PARTICLE_COUNT) * Math.PI * 2 + time;
                        pos[ix] += (tx + Math.cos(angle) * 2.5 - pos[ix]) * 0.1;
                        pos[iy] += (ty + Math.sin(angle) * 2.5 * 0.3 - pos[iy]) * 0.1;
                        pos[iz] += (Math.sin(angle) * 2.5 * 0.3 - pos[iz]) * 0.1;
                        col[ix] = 0.6; col[iy] = 0.8; col[iz] = 1.0;
                    }
                } else {
                    // IDLE/EXPAND
                    const factor = gestureMode === "EXPAND" ? -0.05 : 0.01;
                    pos[ix] += (tx - pos[ix]) * factor + Math.sin(time + i) * 0.01;
                    pos[iy] += (ty - pos[iy]) * factor + Math.cos(time + i) * 0.01;
                    col[ix] += (1 - col[ix]) * 0.05; col[iy] += (1 - col[iy]) * 0.05; col[iz] += (1 - col[iz]) * 0.05;
                }
            }

            particles.geometry.attributes.position.needsUpdate = true;
            particles.geometry.attributes.color.needsUpdate = true;
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
