<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Morphing System</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #0f0; font-family: 'Courier New', monospace; }
        #video-container { position: absolute; bottom: 20px; right: 20px; width: 220px; height: 160px; border: 2px solid #333; border-radius: 10px; overflow: hidden; transform: scaleX(-1); }
        video { width: 100%; height: 100%; object-fit: cover; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid #0f0; pointer-events: none; }
        #start-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; background: #0f0; color: black; border: none; font-weight: bold; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

    <button id="start-btn">ACTIVATE SYSTEM</button>
    <div id="ui">
        <div>MODE: <span id="mode-text">INITIALIZING</span></div>
        <div>DISTANCE: <span id="dist-text">0</span></div>
        <div style="font-size: 0.8em; margin-top: 5px; color: #888;">Bring hand close to switch shapes</div>
    </div>
    <div id="video-container"><video id="input-video" playsinline></video></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const videoElement = document.getElementById('input-video');
        const startBtn = document.getElementById('start-btn');
        const modeText = document.getElementById('mode-text');
        const distText = document.getElementById('dist-text');

        let scene, camera, renderer, points, targetPositions, currentMode = 0;
        const particleCount = 12000;
        const modes = ['HEART', 'SATURN', 'FIREWORKS', 'FLOWER'];

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 12;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(particleCount * 3);
            const cols = new Float32Array(particleCount * 3);
            targetPositions = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                pos[i*3] = (Math.random()-0.5)*20;
                pos[i*3+1] = (Math.random()-0.5)*20;
                pos[i*3+2] = (Math.random()-0.5)*20;
                cols[i*3] = Math.random(); 
                cols[i*3+1] = Math.random();
                cols[i*3+2] = 1;
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
            points = new THREE.Points(geo, new THREE.PointsMaterial({size: 0.04, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true}));
            scene.add(points);
        }

        // --- Templates ---
        function generateShape(mode, handX, handY) {
            modeText.innerText = modes[mode];
            for (let i = 0; i < particleCount; i++) {
                let x, y, z;
                if (mode === 0) { // Heart
                    const t = Math.random() * Math.PI * 2;
                    x = 0.4 * (16 * Math.pow(Math.sin(t), 3));
                    y = 0.4 * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                    z = (Math.random() - 0.5) * 2;
                } else if (mode === 1) { // Saturn
                    if (i < particleCount * 0.4) { // Planet
                        const u = Math.random() * Math.PI * 2;
                        const v = Math.random() * Math.PI;
                        x = 3 * Math.sin(v) * Math.cos(u);
                        y = 3 * Math.sin(v) * Math.sin(u);
                        z = 3 * Math.cos(v);
                    } else { // Rings
                        const angle = Math.random() * Math.PI * 2;
                        const radius = 4.5 + Math.random() * 2.5;
                        x = radius * Math.cos(angle);
                        y = (radius * Math.sin(angle)) * 0.2; // Flattened
                        z = radius * Math.sin(angle);
                    }
                } else if (mode === 2) { // Fireworks
                    const r = Math.random() * 8;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.random() * Math.PI;
                    x = r * Math.sin(phi) * Math.cos(theta);
                    y = r * Math.sin(phi) * Math.sin(theta);
                    z = r * Math.cos(phi);
                } else { // Flower
                    const t = Math.random() * Math.PI * 2;
                    const r = 5 * Math.cos(5 * t); // 5 petals
                    x = r * Math.cos(t);
                    y = r * Math.sin(t);
                    z = (Math.random() - 0.5) * 1;
                }
                targetPositions[i*3] = x + handX;
                targetPositions[i*3+1] = y + handY;
                targetPositions[i*3+2] = z;
            }
        }

        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({maxNumHands: 1, minDetectionConfidence: 0.6});

        let lastSwitchTime = 0;
        hands.onResults((res) => {
            if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                const h = res.multiHandLandmarks[0];
                const x = (0.5 - h[8].x) * 25;
                const y = (0.5 - h[8].y) * 18;
                
                // Calculate "Depth" based on distance between wrist (0) and middle finger base (9)
                const dx = h[0].x - h[9].x;
                const dy = h[0].y - h[9].y;
                const distance = Math.sqrt(dx*dx + dy*dy);
                distText.innerText = distance.toFixed(2);

                // Switch mode if hand is very close (distance > 0.12)
                if (distance > 0.14 && Date.now() - lastSwitchTime > 1500) {
                    currentMode = (currentMode + 1) % modes.length;
                    lastSwitchTime = Date.now();
                }
                generateShape(currentMode, x, y);
            }
        });

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            new Camera(videoElement, {onFrame: async () => { await hands.send({image: videoElement}); }, width: 640, height: 480}).start();
        });

        function animate() {
            requestAnimationFrame(animate);
            if (points) {
                const pa = points.geometry.attributes.position.array;
                for (let i = 0; i < particleCount * 3; i++) {
                    pa[i] += (targetPositions[i] - pa[i]) * 0.08;
                }
                points.geometry.attributes.position.needsUpdate = true;
                points.rotation.y += 0.003;
            }
            renderer.render(scene, camera);
        }

        initThree();
        generateShape(0, 0, 0);
        animate();
    </script>
</body>
</html>
