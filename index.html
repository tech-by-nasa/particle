<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Particle System</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #00ff00; font-family: 'Courier New', monospace; }
        #video-container { 
            position: absolute; bottom: 20px; right: 20px; width: 220px; height: 160px; 
            border: 2px solid #00ff00; border-radius: 12px; overflow: hidden; 
            transform: scaleX(-1); background: #111; z-index: 1000;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        #hud { 
            position: absolute; top: 20px; left: 20px; background: rgba(0, 15, 0, 0.9); 
            padding: 15px; border: 1px solid #00ff00; z-index: 1000; pointer-events: none;
        }
        .val { color: #fff; font-weight: bold; }
        #boot-screen {
            position: absolute; inset: 0; background: #000; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        #start-btn {
            padding: 25px 60px; background: #00ff00; color: #000; border: none;
            font-weight: 900; font-size: 1.5rem; cursor: pointer; border-radius: 8px;
            box-shadow: 0 0 30px #00ff00;
        }
    </style>
</head>
<body>

<div id="boot-screen">
    <h1 style="margin-bottom: 30px;">Interactive Particle System</h1>
    <button id="start-btn">START</button>
</div>

<div id="hud">
    <div>MODE: <span id="mode-ui" class="val">HEART</span></div>
    <div>AI STATUS: <span id="status-ui" class="val" style="color:red">OFFLINE</span></div>
</div>

<div id="video-container"><video id="input-video" autoplay playsinline muted></video></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
    const video = document.getElementById('input-video');
    const startBtn = document.getElementById('start-btn');
    const statusUI = document.getElementById('status-ui');
    const modeUI = document.getElementById('mode-ui');

    let scene, camera, renderer, particles, targetPositions;
    const pCount = 5000;
    let currentMode = 0;
    const modes = ['HEART', 'FLOWERS', 'SATURN', 'FIREWORKS'];

    // Scene Setup
    function init3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 50;

        renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(pCount * 3);
        const cols = new Float32Array(pCount * 3);
        targetPositions = new Float32Array(pCount * 3);

        for (let i = 0; i < pCount; i++) {
            cols[i * 3] = Math.random();
            cols[i * 3 + 1] = Math.random();
            cols[i * 3 + 2] = Math.random();
        }

        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
        particles = new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.1, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true }));
        scene.add(particles);
    }

    // Shape Math
    function setShape(mode, hX, hY, scale = 1.0) {
        modeUI.innerText = modes[mode];
        for (let i = 0; i < pCount; i++) {
            const idx = i * 3;
            const t = (i / pCount) * Math.PI * 2;
            let x, y, z;

            switch (modes[mode]) {
                case 'HEART':
                    x = 16 * Math.pow(Math.sin(t), 3);
                    y = (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                    z = 0;
                    break;
                case 'FLOWERS':
                    const flowerSize = 5;
                    x = flowerSize * Math.sin(t * 6) * Math.cos(t);
                    y = flowerSize * Math.sin(t * 6) * Math.sin(t);
                    z = Math.sin(t * 3) * flowerSize * 0.5;
                    break;
                case 'SATURN':
                    const radius = 10;
                    x = radius * Math.cos(t);
                    y = radius * Math.sin(t) * 0.1;
                    z = Math.sin(t) * radius;
                    break;
                case 'FIREWORKS':
                    const fireworkSize = 15;
                    x = fireworkSize * Math.cos(t + Math.random() * Math.PI);
                    y = fireworkSize * Math.sin(t + Math.random() * Math.PI);
                    z = Math.random() * 10;
                    break;
            }
            targetPositions[idx] = (x * scale) + hX;
            targetPositions[idx + 1] = (y * scale) + hY;
            targetPositions[idx + 2] = z * scale;
        }
    }

    // AI Tracking Logic
    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });

    hands.onResults((res) => {
        if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
            statusUI.innerText = "ONLINE"; statusUI.style.color = "#00ff00";
            const h = res.multiHandLandmarks[0];
            const hX = (0.5 - h[9].x) * 50;
            const hY = (0.5 - h[9].y) * 40;
            const span = Math.hypot(h[4].x - h[20].x, h[4].y - h[20].y);
            setShape(currentMode, hX, hY, span > 0.15 ? 2.5 : 1.0);
        } else {
            statusUI.innerText = "SEARCHING"; statusUI.style.color = "orange";
            setShape(currentMode, 0, 0, 1.0);
        }
    });

    // Force Boot Sequence
    async function forceStart() {
        document.getElementById('boot-screen').style.display = 'none';
        init3D();
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            
            const tick = async () => {
                if (video.readyState >= 2) {
                    await hands.send({ image: video });
                }
                requestAnimationFrame(tick);
            };
            tick();

            function render() {
                requestAnimationFrame(render);
                const pa = particles.geometry.attributes.position.array;
                for (let i = 0; i < pCount * 3; i++) pa[i] += (targetPositions[i] - pa[i]) * 0.1;
                particles.geometry.attributes.position.needsUpdate = true;
                particles.rotation.y += 0.01; // Spin effect
                renderer.render(scene, camera);
            }
            render();
        } catch (e) { alert("Camera Error: " + e.message); }
    }

    startBtn.addEventListener('click', forceStart);
</script>
</body>
</html>
</body>
</html>
