<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Gesture Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #00ff00; font-family: 'Courier New', monospace; }
        #video-container { position: absolute; bottom: 20px; right: 20px; width: 220px; height: 160px; border: 2px solid #00ff00; border-radius: 10px; overflow: hidden; transform: scaleX(-1); background: #111; z-index: 10; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid #00ff00; pointer-events: none; z-index: 10; }
        #start-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; background: #00ff00; color: black; border: none; font-weight: bold; cursor: pointer; z-index: 100; box-shadow: 0 0 20px #00ff00; }
    </style>
</head>
<body>

    <button id="start-btn">BOOT SYSTEM</button>
    <div id="ui">
        <div style="font-weight: bold; margin-bottom: 5px;">SYSTEM STATUS: ONLINE</div>
        <div>TEMPLATE: <span id="mode-text" style="color:white">HEART</span></div>
        <div>HAND DEPTH: <span id="dist-text" style="color:white">0</span></div>
    </div>
    <div id="video-container"><video id="input-video" playsinline></video></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const videoElement = document.getElementById('input-video');
        const startBtn = document.getElementById('start-btn');
        const modeText = document.getElementById('mode-text');
        const distText = document.getElementById('dist-text');

        let scene, camera, renderer, points, targetPositions, currentMode = 0;
        const particleCount = 15000;
        const modes = ['HEART', 'SATURN', 'FIREWORKS', 'FLOWER', 'SPHERE'];

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(particleCount * 3);
            const cols = new Float32Array(particleCount * 3);
            targetPositions = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                cols[i*3] = 0.2 + Math.random() * 0.8; 
                cols[i*3+1] = 0.2 + Math.random() * 0.5;
                cols[i*3+2] = 1.0;
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
            points = new THREE.Points(geo, new THREE.PointsMaterial({size: 0.06, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.8}));
            scene.add(points);
        }

        function generateShape(mode, hX, hY) {
            modeText.innerText = modes[mode];
            for (let i = 0; i < particleCount; i++) {
                let x, y, z;
                const i3 = i * 3;

                if (mode === 0) { // HEART (Improved)
                    const t = (i / particleCount) * Math.PI * 2;
                    const r = 0.5;
                    x = r * (16 * Math.pow(Math.sin(t), 3));
                    y = r * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                    z = (Math.random() - 0.5) * 3;
                } 
                else if (mode === 1) { // SATURN
                    if (i < particleCount * 0.5) { // Planet
                        const u = Math.random() * Math.PI * 2;
                        const v = Math.random() * Math.PI;
                        x = 4 * Math.sin(v) * Math.cos(u);
                        y = 4 * Math.sin(v) * Math.sin(u);
                        z = 4 * Math.cos(v);
                    } else { // Wide Rings
                        const a = Math.random() * Math.PI * 2;
                        const r = 6 + Math.random() * 4;
                        x = r * Math.cos(a);
                        y = (r * Math.sin(a)) * 0.25; 
                        z = r * Math.sin(a);
                    }
                } 
                else if (mode === 2) { // FIREWORKS (Explosive)
                    const r = 1 + Math.pow(Math.random(), 2) * 12;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.random() * Math.PI;
                    x = r * Math.sin(phi) * Math.cos(theta);
                    y = r * Math.sin(phi) * Math.sin(theta);
                    z = r * Math.cos(phi);
                }
                else if (mode === 3) { // FLOWER
                    const t = (i / particleCount) * Math.PI * 20;
                    const r = 6 * Math.sin(2.5 * t);
                    x = r * Math.cos(t);
                    y = r * Math.sin(t);
                    z = (Math.random() - 0.5) * 2;
                }
                else { // SPHERE
                    const u = Math.random() * Math.PI * 2;
                    const v = Math.random() * Math.PI;
                    x = 7 * Math.sin(v) * Math.cos(u);
                    y = 7 * Math.sin(v) * Math.sin(u);
                    z = 7 * Math.cos(v);
                }

                targetPositions[i3] = x + hX;
                targetPositions[i3+1] = y + hY;
                targetPositions[i3+2] = z;
            }
        }

        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({maxNumHands: 1, minDetectionConfidence: 0.7});

        let lastSwitchTime = 0;
        hands.onResults((res) => {
            let hX = 0, hY = 0;
            if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                const h = res.multiHandLandmarks[0];
                // Better Mapping: 0.5 is center, scale up to 30 for screen width
                hX = (0.5 - h[9].x) * 35; 
                hY = (0.5 - h[9].y) * 25;

                const dx = h[0].x - h[9].x;
                const dy = h[0].y - h[9].y;
                const distance = Math.sqrt(dx*dx + dy*dy);
                distText.innerText = distance.toFixed(2);

                // If hand comes close, cycle through shapes
                if (distance > 0.15 && Date.now() - lastSwitchTime > 2000) {
                    currentMode = (currentMode + 1) % modes.length;
                    lastSwitchTime = Date.now();
                }
                generateShape(currentMode, hX, hY);
            } else {
                // If no hand, keep shape at center
                generateShape(currentMode, 0, 0);
            }
        });

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            }).start();
        });

        function animate() {
            requestAnimationFrame(animate);
            if (points) {
                const pa = points.geometry.attributes.position.array;
                for (let i = 0; i < particleCount * 3; i++) {
                    // SMOOTH INTERPOLATION (Lerp)
                    pa[i] += (targetPositions[i] - pa[i]) * 0.1;
                }
                points.geometry.attributes.position.needsUpdate = true;
                // Add a very slight global rotation
                points.rotation.y += 0.005;
            }
            renderer.render(scene, camera);
        }

        initThree();
        generateShape(0, 0, 0);
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
