<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Particle System</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: white; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        
        #video-container {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            border: 2px solid #00ff00;
            border-radius: 8px;
            overflow: hidden;
            transform: scaleX(-1);
            background: #111;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        #overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 1px solid #333;
            pointer-events: none;
        }

        #start-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 20px;
            background: #00ff00;
            border: none;
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body>

    <button id="start-btn">INITIALIZE AI & PARTICLES</button>

    <div id="overlay">
        <div style="color: #00ff00; font-weight: bold;">AI ONLINE</div>
        <div id="status">Landmarks: 0</div>
        <div id="gesture">Gesture: IDLE</div>
    </div>

    <div id="video-container">
        <video id="input-video" playsinline></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const videoElement = document.getElementById('input-video');
        const startBtn = document.getElementById('start-btn');
        const statusEl = document.getElementById('status');
        
        const particleCount = 8000;
        let scene, camera, renderer, points;
        let targetPositions = new Float32Array(particleCount * 3);
        let currentPositions = new Float32Array(particleCount * 3);

        // 1. Setup Three.js
        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 10;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            const colors = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                const x = (Math.random() - 0.5) * 20;
                const y = (Math.random() - 0.5) * 20;
                const z = (Math.random() - 0.5) * 10;
                
                currentPositions[i * 3] = x;
                currentPositions[i * 3 + 1] = y;
                currentPositions[i * 3 + 2] = z;

                targetPositions[i * 3] = x;
                targetPositions[i * 3 + 1] = y;
                targetPositions[i * 3 + 2] = z;

                colors[i * 3] = 0.5 + Math.random() * 0.5; // Pinkish/Blue
                colors[i * 3 + 1] = 0.2;
                colors[i * 3 + 2] = 0.8;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.05,
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending
            });

            points = new THREE.Points(geometry, material);
            scene.add(points);
        }

        // 2. Shape Logic (Heart)
        function updateToHeart(handX = 0, handY = 0) {
            for (let i = 0; i < particleCount; i++) {
                const t = Math.random() * Math.PI * 2;
                const r = 0.25;
                const x = r * (16 * Math.pow(Math.sin(t), 3));
                const y = r * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                
                targetPositions[i * 3] = x + handX;
                targetPositions[i * 3 + 1] = y + handY;
                targetPositions[i * 3 + 2] = (Math.random() - 0.5) * 2;
            }
        }

        // 3. MediaPipe Setup
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                statusEl.innerText = `Landmarks: DETECTED`;
                
                // Map hand to 3D space
                const x = (0.5 - hand[8].x) * 20;
                const y = (0.5 - hand[8].y) * 15;
                updateToHeart(x, y);
            } else {
                statusEl.innerText = `Landmarks: 0 (Show your hand)`;
            }
        });

        // 4. Start Interaction
        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            const cameraHelper = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({ image: videoElement });
                },
                width: 640,
                height: 480
            });
            cameraHelper.start();
        });

        // 5. Render Loop
        function animate() {
            requestAnimationFrame(animate);
            
            if (points) {
                const posAttr = points.geometry.attributes.position;
                for (let i = 0; i < particleCount * 3; i++) {
                    posAttr.array[i] += (targetPositions[i] - posAttr.array[i]) * 0.05;
                }
                posAttr.needsUpdate = true;
                points.rotation.y += 0.002;
            }

            renderer.render(scene, camera);
        }

        initThree();
        updateToHeart(0,0);
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
