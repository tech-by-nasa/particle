<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Particle System</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        
        /* The "FaceTime" style camera box */
        #video-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 240px;
            height: 180px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            transform: scaleX(-1); /* Mirror the camera */
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Hand Gesture Particles</h1>
        <p>Open Palm: Expand | Pinch: Attract | Move Hand to Control</p>
    </div>

    <div id="video-container">
        <video id="input-video"></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const videoElement = document.getElementById('input-video');
        const particleCount = 10000;
        let scene, camera, renderer, points, positions, colors;
        let targetPositions = new Float32Array(particleCount * 3);
        let currentMode = 'cloud';

        // --- 1. Three.js Initialization ---
        function initScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            positions = new Float32Array(particleCount * 3);
            colors = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 10;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 10;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 10;
                
                colors[i * 3] = Math.random();
                colors[i * 3 + 1] = Math.random();
                colors[i * 3 + 2] = 1.0;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.03,
                vertexColors: true,
                blending: THREE.AdditiveBlending,
                transparent: true,
                opacity: 0.8
            });

            points = new THREE.Points(geometry, material);
            scene.add(points);
        }

        // --- 2. Shape Generators ---
        function setHeartShape() {
            for (let i = 0; i < particleCount; i++) {
                const t = Math.random() * Math.PI * 2;
                const x = 0.15 * (16 * Math.pow(Math.sin(t), 3));
                const y = 0.15 * (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                targetPositions[i * 3] = x;
                targetPositions[i * 3 + 1] = y;
                targetPositions[i * 3 + 2] = (Math.random() - 0.5) * 0.5;
            }
        }

        // --- 3. Hand Tracking Logic ---
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // Tip of Index Finger (Landmark 8)
                const indexTip = landmarks[8];
                const tx = (0.5 - indexTip.x) * 12; // Inverted for mirroring
                const ty = (0.5 - indexTip.y) * 12;

                // Simple Gesture: Distance between Thumb (4) and Index (8)
                const dx = landmarks[4].x - landmarks[8].x;
                const dy = landmarks[4].y - landmarks[8].y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                // If pinching, move toward finger. If open, move to heart shape.
                if (dist < 0.05) {
                    for (let i = 0; i < particleCount; i++) {
                        targetPositions[i * 3] = tx + (Math.random() - 0.5);
                        targetPositions[i * 3 + 1] = ty + (Math.random() - 0.5);
                        targetPositions[i * 3 + 2] = (Math.random() - 0.5);
                    }
                } else {
                    setHeartShape();
                }
            }
        });

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        cameraFeed.start();

        // --- 4. Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            const posAttr = points.geometry.attributes.position;
            for (let i = 0; i < particleCount * 3; i++) {
                // Lerp current position toward target position
                posAttr.array[i] += (targetPositions[i] - posAttr.array[i]) * 0.1;
            }
            posAttr.needsUpdate = true;

            points.rotation.y += 0.005;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initScene();
        setHeartShape(); // Start with heart
        animate();
    </script>
</body>
</html>
</body>
</html>
